<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Episode Readiness Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16211f;
        --muted: #5e6b67;
        --line: #d9e0dd;
        --panel: #f7faf8;
        --accent: #136f63;
        --warn: #a15c00;
        --block: #a52828;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .lede {
        color: var(--muted);
        max-width: 760px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.8fr);
        gap: 24px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .tracks {
        display: grid;
        gap: 12px;
      }

      .track {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        align-items: end;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .track-meta {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      select {
        width: 100%;
        min-height: 40px;
        border: 1px solid #bfcbc7;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        padding: 8px 10px;
      }

      .toggles {
        display: flex;
        gap: 10px;
        align-items: center;
        min-height: 40px;
      }

      .toggles label {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .toggles input {
        width: auto;
        min-height: auto;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        border-radius: 999px;
        padding: 0 12px;
        font-weight: 700;
      }

      .status.ready {
        color: #075246;
        background: #dff5ef;
      }

      .status.review {
        color: #7a4400;
        background: #fff1d6;
      }

      .status.blocked {
        color: #8b1e1e;
        background: #ffe0e0;
      }

      .issues {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .issue {
        border-left: 4px solid var(--warn);
        border-radius: 6px;
        background: #ffffff;
        padding: 12px;
      }

      .issue.blocker {
        border-left-color: var(--block);
      }

      .issue.info {
        border-left-color: var(--accent);
      }

      .issue strong {
        display: block;
        margin-bottom: 4px;
      }

      .issue span {
        color: var(--muted);
      }

      .issue-actions {
        margin-top: 10px;
      }

      .issue-actions button {
        min-height: 34px;
        padding: 6px 10px;
        font-size: 13px;
      }

      .issue-actions button.secondary {
        background: #ffffff;
        color: var(--accent);
        border-color: #bfcbc7;
      }

      .continue-note {
        color: var(--muted);
        font-size: 13px;
        margin-top: 14px;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      button {
        min-height: 40px;
        border: 1px solid #0f5d53;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 8px 12px;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: var(--accent);
      }

      @media (max-width: 840px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .track {
          grid-template-columns: 1fr;
        }
      }
    </style>
      <script src="../preview/ingest-nav.js" defer></script>
  </head>
  <body data-ingest-step="episode-readiness">
    <main>
      <h1>Episode readiness</h1>
      <p class="lede">Review synced speaker tracks before choosing a preset. Each flagged issue links to the right fix — this screen stays focused on getting every speaker assigned, not technical diagnostics.</p>

      <section class="workspace" aria-label="Episode readiness workspace">
        <div class="panel">
          <h2>Speaker tracks</h2>
          <div class="tracks" id="tracks"></div>
          <div class="actions">
            <button type="button" id="addGuest">Add guest</button>
            <button type="button" class="secondary" id="reset">Reset sample</button>
          </div>
        </div>

        <aside class="panel" aria-live="polite">
          <h2>Readiness summary</h2>
          <div id="status" class="status ready">Ready</div>
          <div id="issues" class="issues"></div>
          <p class="continue-note" id="continueNote"></p>
          <button type="button" id="continue" disabled>Continue to preset styling</button>
        </aside>
      </section>
    </main>

    <script>
      const fixSurfaces = {
        "source-media-health": {
          label: "Replace or check the file",
          routed: "Continue in source media health.",
        },
        "speaker-sync-repair": {
          label: "Align the tracks",
          routed: "Continue in sync repair.",
        },
        "social-context-intake": {
          label: "Add a name or social link",
          routed: "Continue in social context intake.",
        },
      };

      const sampleTracks = [
        {
          id: "host",
          name: "Host",
          speakerName: "Dana Brooks",
          role: "host",
          duration: 3600,
          audioKey: "host-audio",
          hasVideo: true,
          transcript: "ready",
        },
        {
          id: "guest-1",
          name: "Guest 1",
          speakerName: "",
          role: "guest",
          duration: 3480,
          audioKey: "guest-audio",
          hasVideo: true,
          transcript: "ready",
        },
      ];

      const recordingOptions = [
        { key: "host-audio", label: "Host studio recording" },
        { key: "guest-audio", label: "Guest remote recording" },
        { key: "producer-audio", label: "Producer backup recording" },
      ];

      let tracks = structuredClone(sampleTracks);
      let handedOff = new Set();

      const tracksElement = document.querySelector("#tracks");
      const issuesElement = document.querySelector("#issues");
      const statusElement = document.querySelector("#status");
      const continueButton = document.querySelector("#continue");
      const continueNoteElement = document.querySelector("#continueNote");

      document.querySelector("#addGuest").addEventListener("click", () => {
        tracks.push({
          id: `guest-${tracks.length}`,
          name: `Guest ${tracks.length}`,
          speakerName: "",
          role: "guest",
          duration: 3000,
          audioKey: `guest-${tracks.length}-audio`,
          hasVideo: false,
          transcript: "not-started",
        });
        render();
      });

      document.querySelector("#reset").addEventListener("click", () => {
        tracks = structuredClone(sampleTracks);
        handedOff = new Set();
        render();
      });

      function evaluateReadiness() {
        const issues = [];

        if (!tracks.some((track) => track.role === "host")) {
          issues.push({
            key: "missing-host",
            severity: "blocker",
            title: "Missing host track",
            action: "Assign one speaker recording to the host bucket before choosing a preset.",
            fixSurface: "source-media-health",
          });
        }

        const fingerprints = new Map();
        for (const track of tracks) {
          if (!track.audioKey) {
            continue;
          }
          fingerprints.set(track.audioKey, [...(fingerprints.get(track.audioKey) || []), track]);
        }

        for (const matches of fingerprints.values()) {
          if (matches.length > 1) {
            issues.push({
              key: `duplicate-audio:${matches.map((track) => track.id).sort().join("|")}`,
              severity: "review",
              title: `${matches.map((track) => track.name).join(" and ")} appear to share audio`,
              action: "Confirm these are separate speakers or replace the duplicate recording.",
              fixSurface: "speaker-sync-repair",
            });
          }
        }

        const longest = Math.max(...tracks.map((track) => Number(track.duration) || 0), 0);
        for (const track of tracks) {
          if (!(track.speakerName || "").trim()) {
            issues.push({
              key: `missing-name:${track.id}`,
              severity: "review",
              title: `${track.name} still needs a speaker name or link`,
              action: "Add who is speaking so spellings and references stay accurate.",
              fixSurface: "social-context-intake",
            });
          }

          if (!track.hasVideo) {
            issues.push({
              key: `audio-only:${track.id}`,
              severity: "review",
              title: `${track.name} is audio-only`,
              action: "Replace the file with video or mark this speaker as audio-only.",
              fixSurface: "source-media-health",
            });
          }

          if (track.transcript !== "ready") {
            issues.push({
              key: `transcript:${track.id}`,
              severity: "review",
              title: `${track.name} transcript is ${track.transcript}`,
              action: "Start transcript generation or replace the recording if the audio cannot be captioned.",
              fixSurface: "source-media-health",
            });
          }

          if (longest - Number(track.duration) > 120) {
            const gapMinutes = Math.round((longest - Number(track.duration)) / 60);
            issues.push({
              key: `duration:${track.id}`,
              severity: "review",
              title: `${track.name} is about ${gapMinutes} minutes shorter than another speaker`,
              action: "Replace the shorter file or align the tracks so the episode stays in sync.",
              fixSurface: "speaker-sync-repair",
            });
          }
        }

        const activeKeys = new Set(issues.map((issue) => issue.key));
        handedOff.forEach((key) => {
          if (!activeKeys.has(key)) {
            handedOff.delete(key);
          }
        });

        const unresolved = issues.filter((issue) => issue.severity === "blocker" || (issue.severity === "review" && !handedOff.has(issue.key)));
        const status = issues.some((issue) => issue.severity === "blocker")
          ? "blocked"
          : unresolved.length
            ? "review"
            : "ready";

        return { status, issues, unresolved: unresolved.length };
      }

      function render() {
        tracksElement.replaceChildren(...tracks.map(renderTrack));
        const readiness = evaluateReadiness();
        statusElement.className = `status ${readiness.status}`;
        statusElement.textContent = readiness.status === "ready"
          ? "Ready for preset styling"
          : readiness.status === "blocked"
            ? "Add a host track first"
            : `${readiness.unresolved} ${readiness.unresolved === 1 ? "issue still open" : "issues still open"}`;

        issuesElement.replaceChildren(
          ...(readiness.issues.length
            ? readiness.issues.map(renderIssue)
            : [Object.assign(document.createElement("p"), { textContent: "All speaker tracks are ready for preset selection." })]),
        );

        continueButton.disabled = readiness.status !== "ready";
        continueNoteElement.textContent = readiness.status === "ready"
          ? "Required buckets are assigned. Open issues that still affect the finished episode will carry forward to export review."
          : readiness.status === "blocked"
            ? "Add a host recording before continuing."
            : "Open the suggested fix for each issue, or resolve it on this screen.";
      }

      function renderTrack(track, index) {
        const row = document.createElement("article");
        row.className = "track";

        const nameInput = document.createElement("input");
        nameInput.dataset.field = "name";
        nameInput.value = track.name;

        const speakerNameInput = document.createElement("input");
        speakerNameInput.dataset.field = "speakerName";
        speakerNameInput.value = track.speakerName || "";
        speakerNameInput.placeholder = "Who is speaking?";

        const roleSelect = renderSelect(
          ["host", "co-host", "guest", "panelist", "producer"].map((role) => ({ value: role, label: role })),
          track.role,
          "role",
        );

        const recordingSelect = renderSelect(getRecordingOptions(track), track.audioKey, "audioKey");

        const durationInput = document.createElement("input");
        durationInput.type = "number";
        durationInput.min = "0";
        durationInput.dataset.field = "duration";
        durationInput.value = Math.round(track.duration / 60);

        const toggles = document.createElement("div");
        toggles.className = "toggles";

        const videoInput = document.createElement("input");
        videoInput.type = "checkbox";
        videoInput.dataset.field = "hasVideo";
        videoInput.checked = track.hasVideo;

        const videoLabel = document.createElement("label");
        videoLabel.append(videoInput, document.createTextNode(" Video"));

        const transcriptSelect = renderSelect(
          ["ready", "processing", "not-started", "failed"].map((status) => ({ value: status, label: status })),
          track.transcript,
          "transcript",
        );

        toggles.append(videoLabel, renderField("Transcript", transcriptSelect));

        const meta = document.createElement("div");
        meta.className = "track-meta";
        meta.append(
          renderField("Bucket", nameInput),
          renderField("Speaker name", speakerNameInput),
          renderField("Role", roleSelect),
        );

        row.append(
          meta,
          renderField("Recording", recordingSelect),
          renderField("Minutes", durationInput),
          toggles,
        );

        row.addEventListener("input", (event) => updateTrack(event, index));
        row.addEventListener("change", (event) => updateTrack(event, index));
        return row;
      }

      function getRecordingOptions(track) {
        if (!track.audioKey || recordingOptions.some((option) => option.key === track.audioKey)) {
          return recordingOptions.map((option) => ({ value: option.key, label: option.label }));
        }

        return [
          ...recordingOptions.map((option) => ({ value: option.key, label: option.label })),
          { value: track.audioKey, label: "Current speaker recording" },
        ];
      }

      function renderField(labelText, control) {
        const label = document.createElement("label");
        label.append(document.createTextNode(labelText), control);
        return label;
      }

      function renderSelect(options, selectedValue, field) {
        const select = document.createElement("select");
        select.dataset.field = field;

        for (const option of options) {
          const optionElement = document.createElement("option");
          optionElement.value = option.value;
          optionElement.textContent = option.label;
          optionElement.selected = option.value === selectedValue;
          select.append(optionElement);
        }

        return select;
      }

      function updateTrack(event, index) {
        const field = event.target.dataset.field;
        if (!field) {
          return;
        }

        tracks[index][field] = field === "hasVideo"
          ? event.target.checked
          : field === "duration"
            ? Number(event.target.value) * 60
            : event.target.value;
        render();
      }

      function renderIssue(issue) {
        const article = document.createElement("article");
        const routed = handedOff.has(issue.key);
        article.className = `issue ${routed ? "info" : issue.severity}`;

        const title = document.createElement("strong");
        title.textContent = issue.title;

        const action = document.createElement("span");
        action.textContent = routed
          ? fixSurfaces[issue.fixSurface].routed
          : issue.action;

        article.append(title, action);

        if (!routed && issue.fixSurface && fixSurfaces[issue.fixSurface]) {
          const actions = document.createElement("div");
          actions.className = "issue-actions";
          const button = document.createElement("button");
          button.type = "button";
          button.className = issue.severity === "blocker" ? "" : "secondary";
          button.textContent = fixSurfaces[issue.fixSurface].label;
          button.addEventListener("click", () => {
            handedOff.add(issue.key);
            render();
          });
          actions.append(button);
          article.append(actions);
        }

        return article;
      }

      render();
    </script>
  </body>
</html>
